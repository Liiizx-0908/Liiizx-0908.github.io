<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C++ 面向对象个性化复习助手</title>
  <style>
    :root {
      --ink: #17213a;
      --muted: #64708a;
      --paper: #f5f3ed;
      --card: #fffdf8;
      --line: #ded9cd;
      --blue: #315dca;
      --blue-soft: #eaf0ff;
      --green: #167a5a;
      --green-soft: #e5f5ef;
      --orange: #d56d2f;
      --orange-soft: #fff0e5;
      --red: #b64040;
      --shadow: 0 16px 45px rgba(33, 42, 66, .10);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(49, 93, 202, .10), transparent 32rem),
        var(--paper);
      font-family: "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      line-height: 1.65;
    }
    body.auth-pending { overflow: hidden; }

    button, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 310px 1fr; }

    .reference-banner {
      position: sticky;
      z-index: 30;
      top: 0;
      padding: 11px 22px;
      border-bottom: 1px solid #8f2d2d;
      color: #fff;
      background: #9e3030;
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .02em;
    }
    .reference-banner strong { color: #ffe29d; }

    .login-overlay {
      position: fixed;
      z-index: 100;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(12, 19, 35, .92);
      backdrop-filter: blur(12px);
    }
    .login-overlay.hidden { display: none; }
    .login-card {
      width: min(560px, 100%);
      padding: clamp(24px, 5vw, 42px);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 24px;
      color: #fff;
      background: #17213a;
      box-shadow: 0 25px 80px rgba(0,0,0,.35);
    }
    .login-card h1 { margin: 8px 0 10px; font-size: clamp(29px, 5vw, 43px); line-height: 1.18; }
    .login-card > p { color: #c9d3ea; }
    .login-card label.field-label { display: block; margin: 18px 0 7px; font-weight: 800; }
    .login-card input[type="text"] {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #7181a8;
      border-radius: 11px;
      color: #17213a;
      background: #fff;
      outline: none;
      font-size: 17px;
    }
    .login-card input[type="text"]:focus { box-shadow: 0 0 0 4px rgba(111,160,255,.20); }
    .login-consent {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin: 16px 0;
      padding: 13px;
      border-radius: 11px;
      color: #dce5f8;
      background: rgba(255,255,255,.07);
      font-size: 13px;
    }
    .login-mode {
      margin-top: 14px;
      padding: 11px 13px;
      border-radius: 10px;
      color: #ffd78d;
      background: rgba(255,207,121,.10);
      font-size: 13px;
    }
    .login-error { min-height: 24px; margin-top: 10px; color: #ffabab; font-weight: 700; }
    .student-badge {
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #fff;
      font-size: 12px;
      white-space: nowrap;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      padding: 26px 20px;
      color: #fff;
      background: #17213a;
    }
    .sidebar-close,
    .sidebar-backdrop { display: none; }

    .brand small {
      display: block;
      color: #aebcdd;
      letter-spacing: .16em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .brand h1 {
      margin: 5px 0 8px;
      font-size: 27px;
      line-height: 1.25;
    }

    .brand p { margin: 0; color: #c9d3ea; font-size: 14px; }
    .score-card {
      margin: 22px 0;
      padding: 17px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      background: rgba(255,255,255,.07);
    }

    .score-row { display: flex; justify-content: space-between; align-items: baseline; }
    .score-number { font-size: 32px; font-weight: 800; color: #ffcf79; }
    .progress {
      height: 8px;
      overflow: hidden;
      margin-top: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
    }
    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #6fa0ff, #ffcf79);
      transition: width .35s ease;
    }

    .nav-day {
      margin: 24px 7px 8px;
      color: #91a4cf;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
    }

    .nav-item {
      width: 100%;
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 9px;
      align-items: center;
      margin: 5px 0;
      padding: 11px 12px;
      border: 0;
      border-radius: 12px;
      color: #dbe3f5;
      background: transparent;
      text-align: left;
    }
    .nav-item:hover, .nav-item.active { background: rgba(255,255,255,.10); color: #fff; }
    .nav-item.done .nav-index { background: var(--green); color: #fff; }
    .nav-item.skipped { opacity: .62; }
    .nav-item.skipped .nav-index { background: #59647d; color: #fff; }
    .nav-index {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255,255,255,.10);
      font-size: 12px;
      font-weight: 800;
    }
    .nav-time { color: #91a4cf; font-size: 11px; }

    .sidebar-actions { display: grid; gap: 9px; margin-top: 22px; }
    .sidebar-actions button {
      padding: 11px 13px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 11px;
      color: #e4eafd;
      background: rgba(255,255,255,.07);
    }

    main { min-width: 0; padding: 34px clamp(20px, 5vw, 70px) 70px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      max-width: 1120px;
      margin: 0 auto 24px;
    }
    .topbar h2 { margin: 0; font-size: 18px; }
    .countdown {
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,.65);
      font-size: 13px;
    }

    .content { max-width: 1120px; margin: 0 auto; }
    .hero {
      position: relative;
      overflow: hidden;
      padding: clamp(26px, 5vw, 54px);
      border-radius: 26px;
      color: #fff;
      background: linear-gradient(125deg, #244da9, #17213a 70%);
      box-shadow: var(--shadow);
    }
    .hero::after {
      content: "</>";
      position: absolute;
      right: 6%;
      bottom: -34px;
      color: rgba(255,255,255,.07);
      font-family: Consolas, monospace;
      font-size: clamp(110px, 18vw, 230px);
      font-weight: 900;
    }
    .eyebrow {
      color: #ffcf79;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .13em;
    }
    .hero h2 {
      max-width: 760px;
      margin: 9px 0 13px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.12;
    }
    .hero p { max-width: 760px; margin: 0; color: #d9e2f7; font-size: 17px; }
    .hero-actions { position: relative; z-index: 1; display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }

    .btn {
      padding: 11px 18px;
      border: 0;
      border-radius: 11px;
      font-weight: 800;
    }
    .btn-primary { color: #17213a; background: #ffcf79; }
    .btn-blue { color: #fff; background: var(--blue); }
    .btn-soft { color: var(--blue); background: var(--blue-soft); }
    .btn-outline { color: var(--ink); border: 1px solid var(--line); background: #fff; }
    .btn-danger { color: var(--red); border: 1px solid #efc6c6; background: #fff7f7; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 14px;
      margin: 18px 0 30px;
    }
    .stat {
      padding: 19px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.70);
    }
    .stat strong { display: block; font-size: 25px; }
    .stat span { color: var(--muted); font-size: 13px; }

    .panel {
      margin: 20px 0;
      padding: clamp(21px, 4vw, 34px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: 0 8px 28px rgba(33, 42, 66, .06);
    }
    .panel h2, .panel h3 { margin-top: 0; }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }
    .section-title h2 { margin: 4px 0 3px; font-size: clamp(27px, 4vw, 40px); line-height: 1.2; }
    .section-title p { margin: 0; color: var(--muted); }
    .tag {
      flex: none;
      padding: 6px 11px;
      border-radius: 999px;
      color: var(--blue);
      background: var(--blue-soft);
      font-size: 12px;
      font-weight: 800;
    }

    .goal-grid, .concept-grid, .rubric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .goal, .concept, .rubric-item {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
    }
    .goal strong, .concept strong { display: block; margin-bottom: 5px; }
    .goal span, .concept span { color: var(--muted); font-size: 14px; }
    .concept b { color: var(--blue); }
    .concept { transition: opacity .2s ease, background .2s ease; }
    .concept.known { background: #f0f1f3; opacity: .72; }
    .concept.known .concept-detail { display: none; }
    .concept-grid.detailed { grid-template-columns: 1fr; }
    .concept.detailed-card { padding: 20px; }
    .concept-explanation {
      margin: 12px 0;
      padding: 13px 15px;
      border-left: 4px solid var(--blue);
      border-radius: 0 10px 10px 0;
      background: #f6f8ff;
      color: #33415f;
    }
    .concept-sections {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0;
    }
    .concept-section {
      padding: 12px 14px;
      border: 1px solid #e3e6ed;
      border-radius: 11px;
      background: #fff;
    }
    .concept-section strong {
      display: block;
      margin-bottom: 5px;
      color: var(--ink);
    }
    .concept-section p { margin: 0; color: var(--muted); font-size: 14px; }
    .concept-code {
      overflow-x: auto;
      margin: 12px 0 0;
      padding: 13px;
      border-radius: 10px;
      color: #e9eefc;
      background: #11192b;
      font: 13px/1.6 Consolas, monospace;
      white-space: pre;
    }
    .concept-more summary {
      margin-top: 10px;
      color: var(--blue);
      font-weight: 800;
      cursor: pointer;
    }
    .known-note { display: none; color: var(--green); font-size: 14px; font-weight: 700; }
    .concept.known .known-note { display: block; }
    .concept-check {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .setup-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    .setup-field {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
    }
    .setup-field label { display: block; margin-bottom: 7px; font-weight: 800; }
    .setup-field small { display: block; margin-top: 7px; color: var(--muted); }
    .setup-field select, .setup-field input {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid #cfd4df;
      border-radius: 9px;
      color: var(--ink);
      background: #fff;
    }
    .plan-day {
      margin: 14px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }
    .plan-day-head {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .plan-task {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-top: 1px dashed #e5e1d8;
    }
    .plan-task:first-of-type { border-top: 0; }
    .plan-task span { color: var(--muted); white-space: nowrap; }
    .plan-alert {
      margin-top: 14px;
      padding: 13px 15px;
      border-radius: 11px;
      color: #8f461c;
      background: var(--orange-soft);
    }
    .profile-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 13px;
    }

    .method {
      margin: 18px 0;
      padding: 16px 18px;
      border-left: 5px solid var(--orange);
      border-radius: 0 12px 12px 0;
      background: var(--orange-soft);
    }
    .method strong { color: #9f4b1d; }
    .method p { margin: 4px 0 0; }

    pre {
      overflow-x: auto;
      margin: 14px 0;
      padding: 19px;
      border-radius: 13px;
      color: #e8eefb;
      background: #11192b;
      font: 14px/1.65 Consolas, "Courier New", monospace;
      tab-size: 4;
      white-space: pre;
    }
    code { font-family: Consolas, "Courier New", monospace; }
    :not(pre) > code {
      padding: 2px 6px;
      border-radius: 5px;
      color: #274ba1;
      background: var(--blue-soft);
    }

    .steps { counter-reset: lesson-step; padding: 0; list-style: none; }
    .steps li {
      position: relative;
      min-height: 34px;
      margin: 11px 0;
      padding-left: 44px;
    }
    .steps li::before {
      counter-increment: lesson-step;
      content: counter(lesson-step);
      position: absolute;
      left: 0;
      top: 0;
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      color: #fff;
      background: var(--blue);
      font-size: 13px;
      font-weight: 800;
    }

    .question {
      margin: 16px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }
    .question.correct { border-color: #7fc6ad; background: var(--green-soft); }
    .question.wrong { border-color: #e2a2a2; background: #fff4f4; }
    .question-title { margin: 0 0 12px; font-weight: 800; }
    .option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin: 7px 0;
      padding: 10px 12px;
      border: 1px solid #e5e1d8;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
    }
    .option:hover { border-color: #aebfea; }
    .feedback {
      display: none;
      margin-top: 11px;
      padding-top: 11px;
      border-top: 1px dashed rgba(23,33,58,.20);
      font-size: 14px;
    }
    .question.answered .feedback { display: block; }

    textarea {
      width: 100%;
      min-height: 230px;
      resize: vertical;
      padding: 16px;
      border: 1px solid #cfd4df;
      border-radius: 12px;
      outline: none;
      color: #e9eefc;
      background: #11192b;
      font: 14px/1.65 Consolas, monospace;
    }
    textarea:focus { border-color: #6f8fda; box-shadow: 0 0 0 3px rgba(49,93,202,.12); }
    .editor-actions { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 11px; }
    .solution { display: none; margin-top: 16px; }
    .solution.show { display: block; }
    .code-result {
      display: none;
      margin-top: 12px;
      padding: 14px;
      border-radius: 11px;
      background: var(--blue-soft);
    }
    .code-result.show { display: block; }

    .lesson-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }

    .mock-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border-radius: 14px;
      color: #fff;
      background: #17213a;
    }
    .mock-score { font-size: 32px; font-weight: 900; color: #ffcf79; }
    .exam-warning {
      padding: 14px;
      border: 1px solid #f0d599;
      border-radius: 12px;
      background: #fff8e9;
    }
    .exam-part {
      margin: 18px 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }
    .exam-part h3 { margin: 0 0 8px; }
    .exam-code {
      overflow-x: auto;
      margin: 12px 0;
      padding: 15px;
      border-radius: 11px;
      color: #e9eefc;
      background: #11192b;
      font: 13px/1.6 Consolas, monospace;
      white-space: pre;
    }
    .exam-answer {
      min-height: 120px;
      margin-top: 10px;
    }
    .exam-checks {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .exam-checks .option { margin: 0; }
    .model-answer {
      margin-top: 12px;
      padding: 12px 14px;
      border: 1px solid #cbd8f5;
      border-radius: 11px;
      background: var(--blue-soft);
    }
    .model-answer summary {
      color: var(--blue);
      font-weight: 800;
      cursor: pointer;
    }
    .score-breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 12px;
    }
    .target-path {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .target-path-item {
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
    }
    .target-path-item strong { display: block; margin-bottom: 5px; }
    .target-path-item span { color: var(--muted); font-size: 14px; }
    .source-note {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .source-note a { color: var(--blue); font-weight: 700; }

    .empty {
      padding: 45px 25px;
      border: 1px dashed #b8b3a9;
      border-radius: 15px;
      color: var(--muted);
      text-align: center;
    }
    .hidden { display: none !important; }
    .mobile-toggle { display: none; }

    .bank-controls {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      gap: 11px;
      margin: 17px 0;
    }
    .bank-controls input, .bank-controls select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cfd4df;
      border-radius: 10px;
      color: var(--ink);
      background: #fff;
    }
    .example-bank-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 15px;
    }
    .example-card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #fff;
    }
    .example-card h3 { margin: 8px 0; }
    .example-card p { color: var(--muted); }
    .example-meta { display: flex; flex-wrap: wrap; gap: 7px; }
    .example-card details {
      margin-top: 13px;
      padding-top: 11px;
      border-top: 1px dashed var(--line);
    }
    .example-card summary { color: var(--blue); font-weight: 800; cursor: pointer; }
    .example-card ul { padding-left: 20px; }

    @media (max-width: 900px) {
      body.sidebar-open { overflow: hidden; }
      .app { display: block; }
      .sidebar {
        position: fixed;
        z-index: 50;
        left: 0;
        width: min(86vw, 330px);
        transform: translateX(-105%);
        transition: transform .25s ease;
        box-shadow: var(--shadow);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-close {
        position: absolute;
        top: 14px;
        right: 14px;
        display: inline-grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(255,255,255,.22);
        border-radius: 10px;
        color: #fff;
        background: rgba(255,255,255,.10);
        font-size: 24px;
        line-height: 1;
      }
      .sidebar-close:hover { background: rgba(255,255,255,.18); }
      .sidebar-backdrop {
        position: fixed;
        z-index: 40;
        inset: 0;
        display: block;
        visibility: hidden;
        opacity: 0;
        border: 0;
        background: rgba(10, 17, 33, .56);
        transition: opacity .25s ease, visibility .25s ease;
      }
      .sidebar-backdrop.show {
        visibility: visible;
        opacity: 1;
      }
      .mobile-toggle {
        display: inline-grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: #fff;
      }
      main { padding-top: 18px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .example-bank-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      main { padding-left: 14px; padding-right: 14px; }
      .topbar { align-items: flex-start; }
      .countdown { display: none; }

    double imag;
public:
    Complex(double r = 0, double i = 0) : real(r), imag(i) {}

    Complex operator+(const Complex& other) const {
        return Complex(real + other.real, imag + other.imag);

    bool operator==(const Complex& other) const {
        return real == other.real && imag == other.imag;

    friend ostream& operator<<(ostream& out, const Complex& value) {

        return out;
    }

        code: `Shape s;           // 错误：抽象类对象
Shape* p = new Circle; // 正确：基类指针指向具体类`,
        mistake: "直接定义抽象类对象，或者派生类遗漏一个纯虚函数实现却仍尝试创建对象。",
        exam: "改错题看到 '=0' 后又出现 Base obj;，通常就是直接实例化抽象类的错误。"

      "共同信息": {
        explain: "多类题中，多个子类都拥有且含义相同的数据应放入基类，例如员工号、姓名、基础价格。这样避免重复，并让基类接口能够统一处理不同子类。",
        code: `class Employee {
protected:
    int id;
    string name;
public:
    Employee(int i, string n) : id(i), name(n) {}
};`,
        mistake: "每个子类重复写 id 和 name，导致初始化、输出和维护代码重复。",

      "变化行为": {
        explain: "多个子类都要做同一件事，但计算方式不同，这个行为适合成为虚函数。例如所有员工都要计算工资，但不同岗位公式不同。",
        code: `class Employee {
public:
    virtual double calcSalary() const = 0;
};`,
        mistake: "在 main 中用大量 if/else 判断岗位类型，而没有利用虚函数把算法交给各子类。",
        exam: "题目出现“不同类型采用不同计算方式，并使用多态”时，变化算法就是虚函数。"
      },
      "Salesman": {
        explain: "销售员是 Employee 的一种具体派生类。它需要额外保存销售额，calcSalary 覆盖基类接口并按销售额乘提成比例计算。",
        code: `class Salesman : public Employee {
    double sales;
public:
    double calcSalary() const override {
        return sales * 0.04;
    }
};`,
        mistake: "把提成 4% 写成乘 4，或函数签名与基类不一致导致没有覆盖。",
        exam: "子类得分点通常包括：继承关系、特有数据、构造函数初始化、override 和正确公式。"
      },
      "Manager": {
        explain: "经理类同样继承 Employee，但工资规则是固定月薪。它说明多态不要求每个子类都有复杂公式，只要求都通过同一接口返回结果。",
        code: `class Manager : public Employee {
public:
    double calcSalary() const override {
        return 8000;
    }
};`,
        mistake: "忘记覆盖纯虚函数，使 Manager 仍是抽象类；或者在 main 中直接按类型手算工资。",
        exam: "最后应通过 Employee* 或 Employee& 调用 calcSalary，才能体现多态，而不只是分别调用子类对象。"
      },
      "成员函数版": {
        explain: "成员函数重载中，左操作数就是当前对象 *this，不需要出现在参数表。因此二元运算符通常只写一个显式参数。",
        code: `class Point {
public:
    Point operator+(const Point& rhs) const {
        return Point(x + rhs.x, y + rhs.y);
    }
};
Point c = a + b; // 等价于 a.operator+(b)`,
        mistake: "成员版 operator+ 写两个参数，忘记左操作数已经由 this 提供。",
        exam: "二元成员运算符：显式参数通常 1 个；一元成员运算符：显式参数通常 0 个。"
      },
      "友元函数版": {
        explain: "友元重载不是成员函数，没有 this，因此左右操作数都要写在参数表。friend 允许它访问类的 private 数据，但它仍然是类外函数。",
        code: `class Point {
    friend Point operator+(const Point& a,
                           const Point& b);
};`,
        mistake: "把友元函数当成成员函数调用，或者只写一个参数。",
        exam: "当左操作数不是本类对象，例如 cout << obj，通常使用友元非成员函数。"
      },
      "输出重载": {
        explain: "operator<< 的左操作数是 ostream 对象 cout，所以通常写成非成员友元函数。返回 ostream& 是为了支持 cout << a << b 这样的连续输出。",
        code: `friend ostream& operator<<(ostream& out,
                           const Point& p) {
    out << "(" << p.x << "," << p.y << ")";
    return out;
}`,
        mistake: "返回 void、把 ostream 按值传递、忘记 return out，或第二个参数没有 const。",
        exam: "固定签名值得熟练：ostream& operator<<(ostream&, const 类名&)。"
      },
      "不可改变规则": {
        explain: "运算符重载只能改变已有运算符面对自定义类型时的行为，不能创建新符号，不能改变优先级、结合性和操作数数量，也不能改变内置类型之间原本的运算意义。",
        code: `// 可以重载 +，但不能创造 ** 作为新运算符
// 不能把二元 + 改成三个操作数`,
        mistake: "试图重载不存在的符号，或认为重载后表达式优先级也会改变。",
        exam: "判断题常问“能否改变优先级/操作数个数”，答案都是不能。"
      },
      "函数模板": {
        explain: "函数模板不是一个具体函数，而是生成一组相似函数的规则。编译器根据实参类型推导 T，再生成对应版本，因此同一逻辑可服务 int、double 或满足运算要求的类。",
        code: `template<typename T>
T larger(T a, T b) {
    return a > b ? a : b;
}`,
        mistake: "只把返回类型改成 T，却仍把形参写成 int；或传入两种无法统一推导的类型。",
        exam: "10 分模板题通常要求模板声明、T 形参和返回值、正确逻辑、至少两种类型测试。"
      },
      "typename T": {
        explain: "T 是类型占位符，不是变量。typename 和 class 在模板参数表中大多等价。实例化时 T 会被具体类型替换，但该类型必须支持模板内部使用的操作。",
        code: `template<typename T>
T add(T a, T b) { return a + b; }

add(2, 3);       // T 是 int
add(1.2, 3.4);   // T 是 double`,
        mistake: "认为 T 只能代表基本类型。自定义类也可以，只要它实现了模板所需要的运算符。",
        exam: "如果模板内部用了 >，则类型 T 必须能够进行 > 比较，这是隐含要求。"
      },
      "类模板": {
        explain: "类模板把类型参数应用到整个类。它适合容器、数组、栈等结构相同但元素类型不同的类。类外定义成员函数时，需要重复模板声明和 Class<T>:: 作用域。",
        code: `template<typename T>
class Box {
    T value;
public:
    Box(T v) : value(v) {}
    T get() const { return value; }
};`,
        mistake: "类外成员定义遗漏 template<typename T>，或把 Box<T>:: 写成 Box::。",
        exam: "类模板改错题常检查模板前缀、作用域中的 <T> 和实例化时的具体类型。"
      },
      "实例化": {
        explain: "实例化是从模板产生具体函数或具体类的过程。函数模板常可由实参自动推导；类模板在传统考试语境下通常必须明确写出类型参数。",
        code: `Box<int> a(3);
Box<double> b(2.5);
// Box c; // 缺少具体类型，传统写法错误`,
        mistake: "创建类模板对象时只写 Box b，而没有写 Box<int>。",
        exam: "看到 template<class T> class Box 后，正确对象形式通常是 Box<具体类型> 对象名。"
      },
      "访问错误": {
        explain: "访问错误的核心不是某个单词，而是访问者与成员权限不匹配。要明确是谁在访问：本类成员、派生类成员、友元，还是类外普通函数。",
        code: `A a;
cout << a.x; // 若 x 为 private/protected，则类外访问错误`,
        mistake: "只写“x 是私有的”却不指出错误代码位置和访问者身份。",
        exam: "满分表达：错误在 a.x；main 是类外普通函数，不能访问 private；应通过 public 接口。"
      },
      "构造错误": {
        explain: "构造类错误包括构造函数写返回类型、缺少可用默认构造、派生类未调用基类带参构造，以及 const/引用成员没有使用初始化列表。",
        code: `class D : public B {
public:
    D(int x) : B(x) {} // 显式构造基类部分
};`,
        mistake: "只修改派生类自己的成员，却忘记对象创建时必须先完成基类部分。",
        exam: "改错时先检查函数名、返回类型、参数，再检查初始化列表和基类构造。"
      },
      "抽象类错误": {
        explain: "抽象类错误通常表现为直接创建含纯虚函数的类对象，或派生类没有实现所有纯虚函数却被实例化。抽象类可以定义指针和引用，只是不能直接产生完整对象。",
        code: `Shape* p = new Circle; // 正确
// Shape s;             // 错误`,
        mistake: "误以为抽象类连指针也不能声明，或者把“不能实例化”写成“不能继承”。",
        exam: "准确原因：类中仍存在未实现的纯虚函数，因此该类是抽象类，不能直接创建对象。"
      },
      "模板错误": {
        explain: "模板错误高频集中在缺少 template 声明、T 未声明、类外成员定义格式错误、类模板实例化缺少类型，以及传入类型不支持模板内部操作。",
        code: `template<typename T>
T Box<T>::get() const {
    return value;
}`,
        mistake: "类外定义写 T Box::get()，既缺少模板声明，也缺少 Box<T>。",
        exam: "改错时逐项检查：模板头、T 的使用、类名<T>::、创建对象时的 <具体类型>。"
      }
    };

    const defaultState = {
      current: "home",
      profile: {
        configured: false,
        days: 3,
        hoursPerDay: 5,
        target: 70
      },
      completed: [],
      knownConcepts: {},
      answers: {},
      wrong: [],
      code: {},
      mockAnswers: {},
      mockText: {},
      mockChecks: {},
      mockCoding: {}
    };

    let activeStudentId = "";
    let authMode = "public-static";
    let state = createDefaultState();
    const content = document.getElementById("content");
    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.getElementById("menuBtn");
    const sidebarCloseBtn = document.getElementById("sidebarCloseBtn");
    const sidebarBackdrop = document.getElementById("sidebarBackdrop");

    function setSidebarOpen(open) {
      sidebar.classList.toggle("open", open);
      sidebarBackdrop.classList.toggle("show", open);
      document.body.classList.toggle("sidebar-open", open);
      menuBtn.setAttribute("aria-expanded", String(open));
      menuBtn.setAttribute("aria-label", open ? "关闭课程目录" : "打开课程目录");
    }

    function closeSidebar() {
      setSidebarOpen(false);
    }

    function toggleSidebar() {
      setSidebarOpen(!sidebar.classList.contains("open"));
    }

    function createDefaultState() {
      return {
        ...defaultState,
        profile: { ...defaultState.profile },
        completed: [],
        knownConcepts: {},
        answers: {},
        wrong: [],
        code: {},
        mockAnswers: {},
        mockText: {},
        mockChecks: {},
        mockCoding: {}
      };
    }

    function stateStorageKey(studentId = activeStudentId) {
      return `cppReviewState:${studentId || "guest"}`;
    }

    function loadState(studentId) {
      try {
        const stored =
          JSON.parse(localStorage.getItem(stateStorageKey(studentId)) || "null") ||
          JSON.parse(localStorage.getItem("cppReviewState") || "{}");
        return {
          ...defaultState,
          ...stored,
          profile: { ...defaultState.profile, ...(stored.profile || {}) },
          knownConcepts: stored.knownConcepts || {},
          answers: stored.answers || {},
          code: stored.code || {},
          mockAnswers: stored.mockAnswers || {},
          mockText: stored.mockText || {},
          mockChecks: stored.mockChecks || {},
          mockCoding: stored.mockCoding || {}
        };
      } catch {
        return createDefaultState();
      }
    }

    function saveState() {
      if (activeStudentId) {
        localStorage.setItem(stateStorageKey(), JSON.stringify(state));
      }
      updateProgress();
      renderNav();
    }

    function getDeviceId() {
      let deviceId = localStorage.getItem("cppReviewDeviceId");
      if (!deviceId) {
        const bytes = new Uint8Array(24);
        crypto.getRandomValues(bytes);
        deviceId = Array.from(bytes, value => value.toString(16).padStart(2, "0")).join("");
        localStorage.setItem("cppReviewDeviceId", deviceId);
      }
      return deviceId;
    }

    function getLocalBinding() {
      try {
        return JSON.parse(localStorage.getItem("cppReviewStudentBinding") || "null");
      } catch {
        return null;
      }
    }

    function setLocalBinding(studentId) {
      localStorage.setItem("cppReviewStudentBinding", JSON.stringify({
        studentId,
        deviceId: getDeviceId(),
        boundAt: new Date().toISOString()
      }));
    }

    async function detectAuthMode() {
      authMode = "public-static";
    }

    async function activateStudent(studentId) {
      const binding = getLocalBinding();
      if (binding && binding.studentId !== studentId) {
        throw new Error(`当前浏览器已经绑定学号 ${binding.studentId}，不能改用其他学号。`);
      }
      setLocalBinding(studentId);
      return { mode: "public-static" };
    }

    function updateLoginModeText() {
      const node = document.getElementById("loginMode");
      node.textContent = "当前为公网静态版：学号与进度保存在当前浏览器中。更换浏览器、清除浏览器数据或使用其他电脑后，系统无法识别为同一设备。";
    }

    async function initializeLogin() {
      await detectAuthMode();
      updateLoginModeText();
      const binding = getLocalBinding();

      if (binding?.studentId) {
        try {
          await activateStudent(binding.studentId);
          completeLogin(binding.studentId);
          return;
        } catch (error) {
          document.getElementById("loginError").textContent = error.message;
        }
      }

      document.getElementById("loginOverlay").classList.remove("hidden");
      document.body.classList.add("auth-pending");
    }

    function completeLogin(studentId) {
      activeStudentId = studentId;
      state = loadState(studentId);
      document.getElementById("studentBadge").textContent = `学号 ${studentId}`;
      document.getElementById("loginOverlay").classList.add("hidden");
      document.body.classList.remove("auth-pending");
      renderNav();
      updateProgress();
      updateCountdown();
      if (!state.profile.configured) showHome(true);
      else if (state.current === "mock") showMock();
      else if (state.current === "wrong") showWrongBook();
      else if (state.current === "bank") showExampleBank();
      else if (lessons.some(lesson => lesson.id === state.current)) showLesson(state.current);
      else showHome();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function isInvalidPracticeCode(value) {
      if (typeof value !== "string") return true;
      const text = value.trim();
      return !text ||
        text === "undefined" ||
        text === "null" ||
        text === "[object Object]" ||
        text.includes("[native code]");
    }

    function getPracticeStarter(lesson) {
      const starter = lesson?.practice?.starter;
      if (!isInvalidPracticeCode(starter)) return starter;
      return `// 本题暂无提示代码，请根据题目要求独立作答。\n// 题目：${lesson?.practice?.prompt || lesson?.practice?.title || ""}`;
    }

    function getPracticeCode(lessonId, lesson) {
      const starter = getPracticeStarter(lesson);
      const saved = state.code[lessonId];
      if (isInvalidPracticeCode(saved)) {
        if (saved !== undefined) {
          delete state.code[lessonId];
          if (activeStudentId) localStorage.setItem(stateStorageKey(), JSON.stringify(state));
        }
        return starter;
      }
      return saved;
    }

    function getTargetProfile() {
      return targetProfiles[state.profile.target] || targetProfiles[70];
    }

    function getRecommendedLessons() {
      const ids = getTargetProfile().lessonIds;
      return ids.map(id => lessons.find(lesson => lesson.id === id)).filter(Boolean);
    }

    function conceptKey(lessonId, conceptIndex) {
      return `${lessonId}:${conceptIndex}`;
    }

    function isConceptKnown(lessonId, conceptIndex) {
      return Boolean(state.knownConcepts[conceptKey(lessonId, conceptIndex)]);
    }

    function isLessonKnown(lesson) {
      return lesson.concepts.length > 0 &&
        lesson.concepts.every((_, index) => isConceptKnown(lesson.id, index));
    }

    function estimatedLessonMinutes(lesson) {
      const unknownCount = lesson.concepts.filter((_, index) => !isConceptKnown(lesson.id, index)).length;
      if (!unknownCount) return 0;
      const ratio = unknownCount / lesson.concepts.length;
      return Math.max(20, Math.round((lesson.time * (0.4 + ratio * 0.6)) / 5) * 5);
    }

    function buildSchedule(includeCompleted = false) {
      const profile = getTargetProfile();
      const dayCount = Number(state.profile.days) || 3;
      const capacity = (Number(state.profile.hoursPerDay) || 5) * 60;
      const tasks = getRecommendedLessons()
        .filter(lesson => !isLessonKnown(lesson))
        .filter(lesson => includeCompleted || !state.completed.includes(lesson.id))
        .map(lesson => ({
          type: "lesson",
          id: lesson.id,
          title: lesson.title,
          minutes: estimatedLessonMinutes(lesson)
        }));

      if (!includeCompleted) {
        profile.drills.forEach(drill => {
          tasks.push({
            type: "drill",
            title: drill.title,
            minutes: drill.minutes,
            target: state.profile.target
          });
        });
        tasks.push({ type: "review", title: "错题补练与知识点回忆", minutes: profile.reviewMinutes });
        tasks.push({ type: "mock", title: "限时模拟与订正", minutes: profile.mockMinutes });
        if (profile.secondMockMinutes) {
          tasks.push({ type: "mock", title: "二次模拟与薄弱题复写", minutes: profile.secondMockMinutes });
        }
      }

      const totalMinutes = tasks.reduce((sum, task) => sum + task.minutes, 0);
      const idealPerDay = Math.max(1, Math.ceil(totalMinutes / dayCount / 5) * 5);
      const days = Array.from({ length: dayCount }, (_, index) => ({
        number: index + 1,
        minutes: 0,
        tasks: []
      }));
      let currentDay = 0;

      tasks.forEach(task => {
        const day = days[currentDay];
        if (
          currentDay < dayCount - 1 &&
          day.tasks.length &&
          day.minutes + task.minutes > idealPerDay + 20
        ) {
          currentDay++;
        }
        days[currentDay].tasks.push(task);
        days[currentDay].minutes += task.minutes;
      });

      return {
        days,
        totalMinutes,
        capacity,
        totalCapacity: capacity * dayCount,
        overloaded: totalMinutes > capacity * dayCount
      };
    }

    function getNextLesson(currentId = "") {
      const recommended = getRecommendedLessons();
      const startIndex = Math.max(-1, recommended.findIndex(lesson => lesson.id === currentId));
      return recommended
        .slice(startIndex + 1)
        .find(lesson => !state.completed.includes(lesson.id) && !isLessonKnown(lesson)) ||
        recommended.find(lesson => !state.completed.includes(lesson.id) && !isLessonKnown(lesson));
    }

    function renderNav() {
      const nav = document.getElementById("lessonNav");
      const recommendedIds = getTargetProfile().lessonIds;
      const schedule = buildSchedule(true);
      const scheduledIds = new Set();
      let markup = schedule.days.map(day => {
        const lessonTasks = day.tasks.filter(task => task.type === "lesson");
        if (!lessonTasks.length) return "";
        lessonTasks.forEach(task => scheduledIds.add(task.id));
        return `
          <div class="nav-day">个性化第 ${day.number} 天</div>
          ${lessonTasks.map(task => {
            const lesson = lessons.find(item => item.id === task.id);
            const number = lessons.indexOf(lesson) + 1;
            return `<button type="button" class="nav-item ${state.current === lesson.id ? "active" : ""} ${state.completed.includes(lesson.id) ? "done" : ""}" data-lesson="${lesson.id}">
              <span class="nav-index">${state.completed.includes(lesson.id) ? "✓" : number}</span>
              <span>${lesson.title}</span>
              <span class="nav-time">${task.minutes}m</span>
            </button>`;
          }).join("")}`;
      }).join("");

      const skipped = lessons.filter(lesson => recommendedIds.includes(lesson.id) && isLessonKnown(lesson));
      if (skipped.length) {
        markup += `<div class="nav-day">已掌握并跳过</div>` + skipped.map(lesson => `
          <button type="button" class="nav-item skipped ${state.current === lesson.id ? "active" : ""}" data-lesson="${lesson.id}">
            <span class="nav-index">↷</span>
            <span>${lesson.title}</span>
            <span class="nav-time">已知</span>
          </button>`).join("");
      }

      const optional = lessons.filter(lesson => !recommendedIds.includes(lesson.id));
      if (optional.length) {
        markup += `<div class="nav-day">目标外选修</div>` + optional.map(lesson => `
          <button type="button" class="nav-item ${state.current === lesson.id ? "active" : ""} ${state.completed.includes(lesson.id) ? "done" : ""}" data-lesson="${lesson.id}">
            <span class="nav-index">${state.completed.includes(lesson.id) ? "✓" : "+"}</span>
            <span>${lesson.title}</span>
            <span class="nav-time">选修</span>
          </button>`).join("");
      }

      nav.innerHTML = markup;
      nav.querySelectorAll("[data-lesson]").forEach(btn => {
        btn.addEventListener("click", () => showLesson(btn.dataset.lesson));
      });
    }

    function updateProgress() {
      const answered = Object.keys(state.answers).length;
      const correct = Object.values(state.answers).filter(Boolean).length;
      const recommended = getRecommendedLessons();
      const resolvedCount = recommended.filter(lesson =>
        state.completed.includes(lesson.id) || isLessonKnown(lesson)
      ).length;
      const lessonPart = recommended.length ? resolvedCount / recommended.length * 70 : 0;
      const quizPart = answered ? (correct / 27) * 30 : 0;
      const mastery = Math.min(100, Math.round(lessonPart + quizPart));
      const skippedCount = recommended.filter(isLessonKnown).length;
      document.getElementById("masteryNumber").textContent = mastery + "%";
      document.getElementById("masteryBar").style.width = mastery + "%";
      document.getElementById("completedText").textContent =
        `${resolvedCount} / ${recommended.length} 课${skippedCount ? ` · 跳过 ${skippedCount}` : ""}`;
      document.getElementById("wrongText").textContent = `${state.wrong.length} 道错题`;
    }

    function formatMinutes(minutes) {
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      if (!hours) return `${rest} 分钟`;
      return rest ? `${hours} 小时 ${rest} 分钟` : `${hours} 小时`;
    }

    function renderPlanMarkup(schedule) {
      return schedule.days.map(day => `
        <div class="plan-day">
          <div class="plan-day-head">
            <strong>第 ${day.number} 天</strong>
            <span class="tag">${formatMinutes(day.minutes)}</span>
          </div>
          ${day.tasks.length ? day.tasks.map(task => `
            <div class="plan-task">
              <strong>${task.type === "lesson"
                ? `<button class="btn btn-soft" style="padding:5px 9px;text-align:left" data-plan-lesson="${task.id}">${task.title}</button>`
                : task.type === "drill"
                  ? `<button class="btn btn-soft" style="padding:5px 9px;text-align:left" data-plan-bank="${task.target}">${task.title}</button>`
                : task.title}</strong>
              <span>${task.minutes} 分钟</span>
            </div>`).join("") : `
            <div class="plan-task"><strong>机动复习或休息</strong><span>按薄弱项补充</span></div>`}
        </div>`).join("") + (schedule.overloaded ? `
          <div class="plan-alert">
            当前任务约 ${formatMinutes(schedule.totalMinutes)}，超过你设置的总时间
            ${formatMinutes(schedule.totalCapacity)}。建议增加每天时长、增加天数，或勾选已经掌握的知识点。

    }

    function renderConceptCard(lessonId, concept, index) {
      const known = isConceptKnown(lessonId, index);
      const detail = conceptDetails[concept[0]] || {
        explain: concept[1].replace(/<[^>]+>/g, ""),
        code: "",
        mistake: "结合本课例题检查概念的适用条件，不要只记结论。",
        exam: "作答时写出判断依据，并用本课例题验证。"
      };
      return `<article class="concept detailed-card ${known ? "known" : ""}" data-concept-card="${index}">
        <strong>${concept[0]}</strong>
        <div class="concept-detail">
          <span>${concept[1]}</span>
          <div class="concept-explanation"><strong>详细理解</strong>${detail.explain}</div>
          <details class="concept-more">
            <summary>展开代码示例、常见错误与考试提示</summary>
            ${detail.code ? `<pre class="concept-code">${escapeHtml(detail.code)}</pre>` : ""}
            <div class="concept-sections">
              <div class="concept-section">
                <strong>常见错误</strong>
                <p>${detail.mistake}</p>
              </div>
              <div class="concept-section">
                <strong>考试怎么答</strong>
                <p>${detail.exam}</p>
              </div>
            </div>
          </details>
        </div>
        <span class="known-note">已掌握，此知识点讲解已跳过。</span>
        <label class="concept-check">
          <input type="checkbox" data-concept-check="${index}" ${known ? "checked" : ""}>
          <span>我已掌握，跳过这个知识点</span>
        </label>
      </article>`;
    }

    function renderQuestion(question, number, prefix = "") {
      const key = prefix + question.id;
      return `<div class="question" data-qid="${key}">
        <p class="question-title">${number}. ${question.text}</p>
        ${question.options.map((option, index) => `
          <label class="option">
            <input type="radio" name="${key}" value="${index}">
            <span>${String.fromCharCode(65 + index)}. ${option}</span>
          </label>`).join("")}
        <div class="feedback"></div>
      </div>`;
    }

    function wireQuestions(questions, prefix = "") {
      questions.forEach(question => {
        const key = prefix + question.id;
        const box = document.querySelector(`[data-qid="${key}"]`);
        if (!box) return;
        box.querySelectorAll("input").forEach(input => {
          input.addEventListener("change", () => answerQuestion(question, Number(input.value), box, key));
        });
      });
    }

    function answerQuestion(question, selected, box, key) {
      const correct = selected === question.answer;
      state.answers[key] = correct;
      if (!correct && !state.wrong.includes(question.id)) state.wrong.push(question.id);
      if (correct) state.wrong = state.wrong.filter(id => id !== question.id);
      box.classList.remove("correct", "wrong");
      box.classList.add("answered", correct ? "correct" : "wrong");
      box.querySelector(".feedback").innerHTML = `<strong>${correct ? "回答正确" : "回答错误"}</strong>：${question.explain}`;
      box.querySelectorAll("input").forEach(input => input.disabled = true);
      saveState();
    }

    function restoreAnsweredQuestions(questions, prefix = "") {
      questions.forEach(question => {
        const key = prefix + question.id;
        if (!(key in state.answers)) return;
        const box = document.querySelector(`[data-qid="${key}"]`);
        if (!box) return;
        const correct = state.answers[key];
        box.classList.add("answered", correct ? "correct" : "wrong");
        box.querySelector(".feedback").innerHTML = `<strong>${correct ? "上次回答正确" : "上次回答错误"}</strong>：${question.explain}`;
        box.querySelectorAll("input").forEach(input => input.disabled = true);
      });
    }

    function checkCode(lesson) {
      const value = document.getElementById("codeEditor").value.toLowerCase().replace(/\s+/g, " ");
      const checks = lesson.practice.keywords.map(keyword => ({
        keyword,
        found: value.includes(keyword.toLowerCase().replace(/\s+/g, " "))
      }));
      const found = checks.filter(item => item.found).length;
      const percent = Math.round(found / checks.length * 100);
      const result = document.getElementById("codeResult");
      result.innerHTML = `
        <strong>结构自检：${found}/${checks.length} 个关键点，约 ${percent}%</strong>
        <div class="rubric-grid" style="margin-top:10px">
          ${checks.map(item => `<div class="rubric-item">${item.found ? "✓" : "○"} <code>${escapeHtml(item.keyword)}</code></div>`).join("")}
        </div>
        <p style="margin-bottom:0;color:var(--muted)">这是结构检查，不是编译器。仍需对照参考答案检查语法、分号、括号和函数返回值。</p>`;
      result.classList.add("show");
    }

    function renderExampleCard(example) {
      return `<article class="example-card" data-example-id="${example.id}">
        <div class="example-meta">
          <span class="tag">${example.category}</span>
          ${example.examForm ? `<span class="tag">${example.examForm}</span>` : ""}
          ${example.track ? `<span class="tag">${example.track} 分专属</span>` : ""}
          <span class="tag">${example.difficulty}</span>
          <span class="tag">${example.points} 分</span>
        </div>
        <h3>${example.title}</h3>
        <p>${example.prompt}</p>
        <div class="example-meta">
          ${example.focus.map(item => `<code>${item}</code>`).join("")}
        </div>
        <details>
          <summary>查看分析步骤与得分点</summary>
          <ol class="steps">
            ${example.outline.map(step => `<li>${step}</li>`).join("")}
          </ol>
          ${example.sourceUrl ? `<p class="source-note">规则依据：<a href="${example.sourceUrl}" target="_blank" rel="noopener">${example.sourceTitle}</a>。题目为本站原创变式。</p>` : ""}
        </details>
      </article>`;
    }

    function renderRelatedExamples(lesson) {
      const related = exampleBank
        .filter(example => example.lessons.includes(lesson.id))
        .slice(0, 4);
      if (!related.length) return "";
      return `<section class="panel">
        <div class="section-title">
          <div>
            <span class="eyebrow" style="color:var(--green)">来自补充资料</span>
            <h2>本知识点扩展例题</h2>
            <p>先完成本课练习，再从下面选择一道迁移题。展开后只看思路和得分点，不直接替代独立编码。</p>
          </div>
          <button class="btn btn-outline" id="openBankFromLesson">查看完整题库</button>
        </div>
        <div class="example-bank-grid">${related.map(renderExampleCard).join("")}</div>
      </section>`;
    }

    function showExampleBank(initialTarget = "") {
      state.current = "bank";
      saveState();
      closeSidebar();
      document.getElementById("topTitle").textContent = "扩展例题库";
      const categories = [...new Set(exampleBank.map(example => example.category))];
      const difficulties = [...new Set(exampleBank.map(example => example.difficulty))];
      content.innerHTML = `
        <section class="panel">
          <div class="section-title">
            <div>
              <span class="eyebrow" style="color:var(--blue)">历年资料 + 官方 C++ 规则整理</span>
              <h2>扩展例题库</h2>
              <p>题目已按目标分、知识点、难度和卷面形式整理。新增题目根据 Microsoft Learn 官方 C++ 规则重新设计，不照搬网上原题。</p>
            </div>
            <span class="tag">${exampleBank.length} 道</span>
          </div>
          <div class="bank-controls">
            <input id="bankSearch" type="search" placeholder="搜索题目、知识点或关键词">
            <select id="bankCategory">
              <option value="">全部类别</option>
              ${categories.map(category => `<option value="${category}">${category}</option>`).join("")}
            </select>
            <select id="bankDifficulty">
              <option value="">全部难度</option>
              ${difficulties.map(difficulty => `<option value="${difficulty}">${difficulty}</option>`).join("")}
            </select>
            <select id="bankTarget">
              <option value="">全部目标</option>
              ${[60,70,80,90].map(score => `<option value="${score}" ${String(initialTarget) === String(score) ? "selected" : ""}>${score} 分专属题</option>`).join("")}
            </select>
          </div>
          <div class="example-bank-grid" id="exampleBankGrid"></div>
          <div class="empty hidden" id="bankEmpty">没有匹配的题目，请减少筛选条件。</div>
        </section>`;

      const renderFilteredBank = () => {
        const query = document.getElementById("bankSearch").value.trim().toLowerCase();
        const category = document.getElementById("bankCategory").value;
        const difficulty = document.getElementById("bankDifficulty").value;
        const target = document.getElementById("bankTarget").value;
        const filtered = exampleBank.filter(example => {
          const text = [
            example.title,
            example.prompt,
            example.category,
            example.examForm || "",
            example.track || "",
            example.difficulty,
            ...example.focus,
            ...example.outline
          ].join(" ").toLowerCase();
          return (!query || text.includes(query)) &&
            (!category || example.category === category) &&
            (!difficulty || example.difficulty === difficulty) &&
            (!target || Number(example.track) === Number(target));
        });
        document.getElementById("exampleBankGrid").innerHTML = filtered.map(renderExampleCard).join("");
        document.getElementById("bankEmpty").classList.toggle("hidden", filtered.length > 0);
      };

      ["bankSearch", "bankCategory", "bankDifficulty", "bankTarget"].forEach(id => {
        document.getElementById(id).addEventListener("input", renderFilteredBank);
        document.getElementById(id).addEventListener("change", renderFilteredBank);
      });
      renderFilteredBank();
      window.scrollTo({ top: 0 });
    }

    function showWrongBook() {
      state.current = "wrong";
      saveState();
      closeSidebar();
      document.getElementById("topTitle").textContent = "错题补练";
      const wrongQuestions = lessons.flatMap(l => l.quiz).filter(q => state.wrong.includes(q.id));
      content.innerHTML = `
        <section class="panel">
          <div class="section-title">
            <div>
              <span class="eyebrow" style="color:var(--red)">错误是最值钱的复习材料</span>
              <h2>错题补练</h2>
              <p>重新答对后，题目会自动从错题本移除。</p>
            </div>
            <span class="tag">${wrongQuestions.length} 道</span>
          </div>
          ${wrongQuestions.length ? wrongQuestions.map((q, i) => renderQuestion(q, i + 1, "retry-")).join("") : `
            <div class="empty">目前没有错题。继续完成课程测验，答错的题会自动出现在这里。</div>`}
        </section>
      `;
      if (wrongQuestions.length) {
        wireQuestions(wrongQuestions, "retry-");
      }
      window.scrollTo({ top: 0 });
    }

    function renderMockShortQuestion(item, index, type) {
      const answerKey = `${type}-${index}`;
      return `<article class="exam-part">
        <h3>${index + 1}. ${item.title} <span class="tag">${type === "read" ? 6 : 3} 分</span></h3>
        <pre class="exam-code">${escapeHtml(item.code)}</pre>
        <label><strong>${type === "read" ? "请写出完整运行结果：" : "请判断并写出错误位置、原因和修改方法："}</strong></label>
        <textarea class="exam-answer" data-mock-text="${answerKey}" placeholder="先独立作答，再展开参考答案……">${escapeHtml(state.mockText[answerKey] || "")}</textarea>
        <details class="model-answer">
          <summary>作答后展开参考答案与讲解</summary>
          <p><strong>参考答案：</strong></p>
          <pre class="exam-code">${escapeHtml(item.answer)}</pre>
          ${item.analysis ? `<p><strong>讲解：</strong>${item.analysis}</p>` : ""}
        </details>
        <div class="exam-checks">
          ${item.checks.map((check, checkIndex) => {
            const key = `${type}-${index}-${checkIndex}`;
            return `<label class="option">
              <input type="checkbox" data-mock-check="${key}" ${state.mockChecks[key] ? "checked" : ""}>
              <span>${check[0]}（${check[1]} 分）</span>
            </label>`;
          }).join("")}
        </div>
      </article>`;
    }

    function showMock() {
      state.current = "mock";
      saveState();
      closeSidebar();
      document.getElementById("topTitle").textContent = `${state.profile.target} 分模拟挑战`;
      content.innerHTML = `
        <section class="panel">
          <div class="section-title">
            <div>
              <span class="eyebrow" style="color:var(--blue)">完全按照已确认的考试结构</span>
              <h2>${state.profile.target} 分目标模拟挑战</h2>
              <p>读程序写结果 30 分 + 指出错误并说明原因 15 分 + 四道编程题 55 分，共 100 分。</p>
            </div>
          </div>
          <div class="mock-head">
            <div>
              <strong>当前模拟自评成绩</strong>
              <div style="color:#cbd5eb">目标线：${state.profile.target} / 100</div>
            </div>
            <div class="mock-score"><span id="mockScore">0</span> 分</div>
          </div>
          <div class="score-breakdown">
            <span class="tag">读程序：5 题 × 6 分 = 30 分</span>
            <span class="tag">改错：5 题 × 3 分 = 15 分</span>
            <span class="tag">编程：10 + 15 + 10 + 20 = 55 分</span>
          </div>
          <p class="exam-warning">建议严格限时 ${getTargetProfile().mockMinutes} 分钟。先在答题框完整作答，再展开参考答案，只勾选真正写到的得分点。此处为自评，不等同于教师阅卷成绩。</p>
        </section>

        <section class="panel">
          <h2>第一部分：读程序写结果（30 分）</h2>
          <p style="color:var(--muted)">共 5 道，每题 6 分。重点检查输出内容、先后顺序以及构造/析构和动态绑定过程。</p>
          ${mockReadQuestions.map((item, index) => renderMockShortQuestion(item, index, "read")).join("")}
        </section>

        <section class="panel">
          <h2>第二部分：指出错误，说明原因（15 分）</h2>
          <p style="color:var(--muted)">共 5 道，每题 3 分。每题必须写清：是否错误、错误位置、技术原因与修改方法。</p>
          ${mockErrorQuestions.map((item, index) => renderMockShortQuestion(item, index, "error")).join("")}
        </section>

        <section class="panel">
          <h2>第三部分：编程题（55 分）</h2>
          <p style="color:var(--muted)">建议在纸上完整手写后再录入。评分点采用历年卷常见要求，但题目情境经过重新设计。</p>
          ${mockCoding.map((item, index) => `
            <article class="exam-part">
              <h3>${index + 1}. ${item.title} <span class="tag">${item.max} 分</span></h3>
              <p>${item.prompt}</p>
              <textarea data-mock-text="coding-${index}" placeholder="在这里写完整 C++ 程序，或记录纸上答案的关键结构……">${escapeHtml(state.mockText[`coding-${index}`] || "")}</textarea>
              <details class="model-answer">
                <summary>作答后展开参考结构</summary>
                <ol class="steps">${item.reference.map(step => `<li>${step}</li>`).join("")}</ol>
              </details>
              <div class="exam-checks">
                ${item.checks.map((check, checkIndex) => {
                  const key = `v2-${index}-${checkIndex}`;
                  return `<label class="option">
                    <input type="checkbox" data-coding="${key}" ${state.mockCoding[key] ? "checked" : ""}>
                    <span>${check[0]}（${check[1]} 分）</span>
                  </label>`;
                }).join("")}
              </div>
            </article>`).join("")}
        </section>

        <section class="panel">
          <div class="lesson-actions">
            <button class="btn btn-outline" id="reviewWrongMock">查看薄弱知识</button>
            <button class="btn btn-primary" id="calculateMock">计算最终成绩</button>
          </div>
          <div class="code-result" id="mockResult"></div>
        </section>
      `;

      document.querySelectorAll("[data-mock-text]").forEach(input => {
        input.addEventListener("input", () => {
          state.mockText[input.dataset.mockText] = input.value;
          localStorage.setItem(stateStorageKey(), JSON.stringify(state));
        });
      });
      document.querySelectorAll("[data-mock-check]").forEach(input => {
        input.addEventListener("change", () => {
          state.mockChecks[input.dataset.mockCheck] = input.checked;
          saveState();
          updateMockScore();
        });
      });
      document.querySelectorAll("[data-coding]").forEach(input => {
        input.addEventListener("change", () => {
          state.mockCoding[input.dataset.coding] = input.checked;
          saveState();
          updateMockScore();
        });
      });
      document.getElementById("calculateMock").onclick = showMockResult;
      document.getElementById("reviewWrongMock").onclick = () => {
        const firstIncomplete = getNextLesson();
        if (firstIncomplete) showLesson(firstIncomplete.id);
        else showWrongBook();
      };
      updateMockScore();
      window.scrollTo({ top: 0 });
    }

    function sumMockChecks(items, type) {
      let score = 0;
      items.forEach((item, itemIndex) => {
        item.checks.forEach((check, checkIndex) => {
          if (state.mockChecks[`${type}-${itemIndex}-${checkIndex}`]) score += check[1];
        });
      });
      return score;
    }

    function calculateMockScore() {
      const read = sumMockChecks(mockReadQuestions, "read");
      const error = sumMockChecks(mockErrorQuestions, "error");
      let coding = 0;
      mockCoding.forEach((item, itemIndex) => {
        item.checks.forEach((check, checkIndex) => {
          if (state.mockCoding[`v2-${itemIndex}-${checkIndex}`]) coding += check[1];
        });
      });
      return { read, error, coding, total: read + error + coding };
    }

    function updateMockScore() {
      const score = calculateMockScore();
      const target = document.getElementById("mockScore");
      if (target) target.textContent = score.total;
    }

    function showMockResult() {
      const score = calculateMockScore();
      const result = document.getElementById("mockResult");
      const reached = score.total >= state.profile.target;
      const message = reached
        ? `已经达到 ${state.profile.target} 分目标。接下来优先清空错题，并再手写一次最薄弱的编程题。`
        : `距离目标还差 ${state.profile.target - score.total} 分。先补读程序和改错中的规则漏洞，再手写尚未拿满得分点的编程题。`;
      result.innerHTML = `<strong>${reached ? "达到目标" : "需要补强"}：${score.total} / 100</strong>
        <p>读程序：${score.read} / 30；改错：${score.error} / 15；编程题：${score.coding} / 55。</p>
        <p style="margin-bottom:0">${message}</p>`;
      result.classList.add("show");
    }

    function updateCountdown() {
      const exam = new Date("2026-06-18T14:00:00+08:00");
      const diff = exam - new Date();
      const node = document.getElementById("countdown");
      if (diff <= 0) {
        node.textContent = "考试时间：2026 年 6 月 18 日下午";
        return;
      }
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      node.textContent = `距离考试约 ${days} 天 ${hours} 小时`;
    }

    document.getElementById("loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      const studentId = document.getElementById("studentIdInput").value.trim();
      const consent = document.getElementById("consentInput").checked;
      const errorNode = document.getElementById("loginError");
      errorNode.textContent = "";
      if (!/^\d{4,20}$/.test(studentId)) {
        errorNode.textContent = "请输入 4–20 位数字学号。";
        return;
      }
      if (!consent) {
        errorNode.textContent = "请先阅读并确认学习参考声明。";
        return;
      }
      try {
        await activateStudent(studentId);
        completeLogin(studentId);
      } catch (error) {
        errorNode.textContent = error.message || "登录失败，请检查服务状态。";
      }
    });

    document.getElementById("settingsBtn").onclick = () => showHome(true);
    document.getElementById("bankBtn").onclick = () => showExampleBank();
    document.getElementById("wrongBookBtn").onclick = showWrongBook;
    document.getElementById("mockBtn").onclick = showMock;
    menuBtn.onclick = toggleSidebar;
    sidebarCloseBtn.onclick = closeSidebar;
    sidebarBackdrop.onclick = closeSidebar;
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && sidebar.classList.contains("open")) closeSidebar();
    });
    window.addEventListener("resize", () => {
      if (window.innerWidth > 900 && sidebar.classList.contains("open")) closeSidebar();
    });
    document.getElementById("resetBtn").onclick = () => {
      if (confirm("确定清空全部课程、答题和代码练习进度吗？")) {
        state = {
          ...defaultState,
          profile: { ...defaultState.profile },
          completed: [],
          knownConcepts: {},
          answers: {},
          wrong: [],
          code: {},
          mockAnswers: {},
          mockText: {},
          mockChecks: {},
          mockCoding: {}
        };
        saveState();
        showHome(true);
      }
    };

    setInterval(updateCountdown, 60000);
    initializeLogin();
  </script>
</body>
</html>
